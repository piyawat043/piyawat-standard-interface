<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIYAWAT STANDARD - FULL OPTION REBORN</title>
	<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
/* === สไตล์พื้นฐาน === */
        body {
            margin: 0; padding: 0;
            width: 1270px; height: 900px; 
            background-color: #000; 
            color: white; font-family: 'Prompt', sans-serif; 
            overflow: hidden; user-select: none; position: relative;
        }

        #bg-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        :root { 
            --neon-blue: #00f3ff; 
            --neon-gold: #ffd700; 
            --neon-green: #228B22; 
            --neon-hot: #ff0055; 
            --glass: rgba(10, 15, 20, 0.9); 
        }

        @keyframes fadeInFromBack { 
            from { opacity: 0; transform: scale(0.5); } 
            to { opacity: 1; transform: scale(1); } 
        }

        /* --- แอนิเมชันแสงกระพริบนีออน (ใส่คืนให้ปุ่ม Billboard) --- */
        @keyframes neon-pulse-blue {
            0% { filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.6)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 243, 255, 1)) drop-shadow(0 0 10px #fff); }
            100% { filter: drop-shadow(0 0 5px rgba(0, 243, 255, 0.6)); }
        }

        @keyframes hot-pulse {
            0% { box-shadow: 0 0 10px var(--neon-hot); }
            50% { box-shadow: 0 0 25px var(--neon-hot), 0 0 10px #fff; }
            100% { box-shadow: 0 0 10px var(--neon-hot); }
        }

        .branding-container {
            position: absolute; top: 10px; left: 20px; z-index: 10;
            animation: fadeIn 1.0s ease-out forwards 0.2s; opacity: 0;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .footer-nav {
            position: absolute; top: 40px; right: 40px; width: 400px; height: 70px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 12px;
            display: flex; align-items: center; padding: 0 20px; cursor: pointer;
            backdrop-filter: blur(5px); z-index: 100; opacity: 0;
            animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.8s;
            transition: all 0.3s ease;
        }
        .footer-nav:hover { transform: scale(1.15) !important; border-color: var(--neon-gold); box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); }

        /* === ปุ่ม Billboard (ใส่แสงกระพริบ neon-pulse-blue คืนที่นี่) === */
        .billboard-6p {
            position: absolute; left: 274.6px; top: 310.8px; width: 452px; height: 171.6px;
            cursor: pointer; z-index: 20; opacity: 0;
            /* เพิ่ม animation: neon-pulse-blue เข้าไปต่อท้ายของเดิม */
            animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 1.4s,
                       neon-pulse-blue 2s infinite ease-in-out; /* <-- แสงกระพริบกลับมาแล้ว */
            transition: all 0.3s ease;
        }
        .billboard-6p:hover { transform: scale(1.15) !important; filter: drop-shadow(0 0 30px var(--neon-blue)); }

        .btn-tool {
            position: absolute; bottom: 200px; left: 60px; width: 110px; z-index: 10;
            opacity: 0; animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.0s;
        }

        .btn-camera-cut {
            position: absolute; bottom: 100px; right: 30px; 
            width: 180px; height: 70px;
            background: linear-gradient(45deg, rgba(255, 0, 85, 0.2), rgba(0, 0, 0, 0.8));
            border: 2px solid var(--neon-hot); border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100;
            color: #fff; font-family: 'Rajdhani', sans-serif;
            backdrop-filter: blur(5px);
            opacity: 0; transform-origin: center;
            animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.6s,
                       hot-pulse 2s infinite ease-in-out;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-camera-cut:hover {
            transform: scale(1.1) rotate(-2deg) !important;
            background: var(--neon-hot);
            color: #fff;
            box-shadow: 0 0 40px var(--neon-hot);
        }
        .hot-tag {
            position: absolute; top: -12px; left: -10px;
            background: #fff; color: #ff0000; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 4px; transform: rotate(-15deg);
            box-shadow: 0 0 10px #fff;
        }

        .btn-warm {
            position: absolute; top: 145px; right: 40px; width: 170px; height: 60px;
            border: 2px solid #ff4500; border-radius: 12px; color: #ff4500;
            opacity: 0; animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.6s;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-call {
            position: absolute; bottom: 30px; right: 20px; width: 160px; height: 50px;
            border: 2px solid var(--neon-green); border-radius: 10px; color: var(--neon-green);
            opacity: 0; animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.6s;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        #floating-menu-btn {
            position: fixed; top: 500px; right: 30px; width: 60px; height: 60px;
            border: 2px solid var(--neon-blue); border-radius: 50%; color: var(--neon-blue);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            opacity: 0; animation: fadeInFromBack 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 2.6s;
        }

        .hover-vid {
            display: none; position: fixed; width: 700px; pointer-events: none; z-index: 9999; 
            border: 2px solid var(--neon-blue); border-radius: 12px; opacity: 0; transition: opacity 0.2s ease;
        }
        .hover-vid.active { display: block !important; opacity: 1; }
    </style>
</head>
<body>

<video id="bg-video" src="bgok.mp4" autoplay loop muted playsinline></video>

<video id="vid-start" class="hover-vid" src="hoverstart.mp4" preload="auto" loop muted playsinline></video>
<video id="vid-calib" class="hover-vid" src="hoversetup.mp4" preload="auto" loop muted playsinline></video>
<video id="vid-tool"  class="hover-vid" src="hovertoolsetter.mp4"  preload="auto" loop muted playsinline></video>

<audio id="snd-cameracut" src="cameracut.mp3" preload="auto"></audio>
<audio id="snd-intro" src="intro.mp3" preload="auto"></audio>
<audio id="snd-click" src="button-pressed.mp3" preload="auto"></audio>
<audio id="snd-setup" src="setup.mp3" preload="auto"></audio>
<audio id="snd-standby" src="standby.mp3" preload="auto"></audio>
<audio id="snd-toolset" src="toolset.mp3" preload="auto"></audio>

<div id="floating-menu-btn" onclick="window.location.href='sidebar.html'">
    <i class="fa-solid fa-ellipsis-vertical"></i>
</div>

<div class="btn-camera-cut" id="camera-cut-btn" onclick="sendAHK('cameracut_')">
    <div class="hot-tag">NEW HOT</div>
    <div style="margin-right: 12px; font-size: 28px;"><i class="fa-solid fa-camera-retro"></i></div>
    <div style="text-align: center; line-height: 1.1;">
        <div style="font-weight: 700; font-size: 20px; letter-spacing: 1px;">CAMERA CUT</div>
        <div style="font-size: 14px; opacity: 0.9; font-family: 'Prompt';">ตัดด้วยกล้อง</div>
    </div>
</div>

<div id="view-dashboard" class="view-section active">
    <div class="branding-container">
        <div id="quote-text" style="font-family: 'Prompt', sans-serif; font-size: 24px; font-weight: 300; font-style: italic; color: rgba(255, 255, 255, 0.65); line-height: 1.5; white-space: pre-line;">"กำลังเชื่อมต่อคลังสมอง..."</div>
        <div id="quote-author" style="font-family: 'Prompt', sans-serif; font-size: 14px; color: var(--neon-blue); margin-top: 10px;">- System -</div>
        <div style="font-family: 'Rajdhani', sans-serif; font-size: 12px; letter-spacing: 5px; color: var(--neon-blue); margin-top: 5px; text-transform: uppercase;">piyawat standard</div>
    </div>
	
    <img id="billboard" class="billboard-6p" src="start.png" onclick="window.location.href='piyawat_flow.html'" alt="เริ่มกระบวนการวัด">

    <div id="footer-nav" class="footer-nav" onclick="window.location.href='setup_mode_name.html'">
        <div style="color:var(--neon-gold); font-size:24px; margin-right:15px;"><i class="fa-solid fa-gear"></i></div>
        <div class="footer-text">
            <div style="font-weight:600; font-size:30px;">ระบบสอบเทียบกึ่งอัตโนมัติ</div>
            <div style="font-size:16px; color:var(--neon-gold); font-family:'Rajdhani';">SEMI-AUTOMATIC CALIBRATION</div>
        </div>
    </div>

    <div class="btn-warm" id="warm-machine-btn" onclick="window.location.href='warm.html'">
        <div style="margin-right: 12px; font-size: 24px;"><i class="fa-solid fa-fire-flame-curved"></i></div>
        <div style="text-align: center;"><div>WARM UP</div><div style="font-size:12px;">วอร์มเครื่องจักร</div></div>
    </div>

    <div class="btn-tool" id="toolsetter-btn" style="cursor: pointer;">
        <img src="toolsetter.png" style="width:100%;" alt="Tool Setup">
    </div>

    <div class="btn-call" id="call-service-btn" onclick="window.location.href='service.html'">
        <div style="margin-right: 12px; font-size: 24px;"><i class="fa-solid fa-headset"></i></div>
        <div>CALL SERVICE</div>
    </div>
</div>

<script>
// (ส่วน JavaScript เหมือนเดิมทุกประการ ไม่มีการแก้ไขครับ)
function setupHoverEffect(triggerId, videoId, soundKey) {
    const trigger = document.getElementById(triggerId);
    const video = document.getElementById(videoId);
    const sound = sounds[soundKey];

    trigger.addEventListener('mouseenter', () => {
        if(video) {
            video.classList.add('active');
            video.play().catch(e => console.log(e));
        }
        if(sound) {
            sound.loop = false; 
            sound.currentTime = 0;
            sound.play();
        }
    });

    trigger.addEventListener('mousemove', (e) => {
        if(video) {
            video.style.left = (e.clientX + 20) + 'px';
            video.style.top = (e.clientY - 20) + 'px';
            if(triggerId === 'footer-nav') video.style.transform = 'translate(-100%, 0)';
            else if(triggerId === 'toolsetter-btn') video.style.transform = 'translate(0, -100%)';
            else video.style.transform = 'translateY(-50%)';
        }
    });

    trigger.addEventListener('mouseleave', () => {
        if(video) {
            video.classList.remove('active');
            video.pause();
            video.currentTime = 0;
        }
        if(sound) {
            sound.pause(); 
        }
    });
}

const sounds = {
    intro: document.getElementById('snd-intro'),
    click: document.getElementById('snd-click'),
    setup: document.getElementById('snd-setup'),
    standby: document.getElementById('snd-standby'),
    toolset: document.getElementById('snd-toolset'),
    cameracut: document.getElementById('snd-cameracut')
};

setupHoverEffect('billboard', 'vid-start', 'standby');
setupHoverEffect('footer-nav', 'vid-calib', 'setup');
setupHoverEffect('toolsetter-btn', 'vid-tool', 'toolset');

const otherButtons = ['warm-machine-btn', 'call-service-btn', 'floating-menu-btn'];
otherButtons.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
        el.addEventListener('mouseenter', () => {
            sounds.setup.currentTime = 0;
            sounds.setup.play();
        });
    }
});

const cameraBtn = document.getElementById('camera-cut-btn');
if(cameraBtn) {
    cameraBtn.addEventListener('mouseleave', () => {
        sounds.cameracut.pause();
        sounds.cameracut.currentTime = 0;
    });
}

document.addEventListener('click', (e) => {
    if (e.target.closest('.billboard-6p') || e.target.closest('.footer-nav') || 
        e.target.closest('.btn-tool') || e.target.closest('#floating-menu-btn') || 
        e.target.closest('.btn-call') || e.target.closest('.btn-warm') || 
        e.target.closest('.btn-camera-cut')) {
        sounds.click.currentTime = 0;
        sounds.click.play();
    }
});

function sendAHK(cmd) {
    if(window.ahk) { window.ahk.global.CNC_Execute(cmd); } 
    else { console.log("AHK Command Sent:", cmd); }
}

async function loadAndChangeQuote() {
    try {
        const response = await fetch('quotes.txt');
        const text = await response.text();
        const rawSets = text.split('---').map(set => set.trim()).filter(set => set.length > 0);
        if (rawSets.length > 0) {
            const selectedSet = rawSets[Math.floor(Math.random() * rawSets.length)];
            const lines = selectedSet.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            const author = lines.pop(); 
            const quoteText = lines.join('\n');
            document.getElementById('quote-text').innerText = quoteText;
            document.getElementById('quote-author').innerText = author;
        }
    } catch (error) { console.log("ระบบคลังสมองออฟไลน์"); }
}

window.onload = () => { 
    loadAndChangeQuote();
    sounds.intro.play().catch(e => console.log("Autoplay waiting...")); 
};
</script>

</body>
</html>
