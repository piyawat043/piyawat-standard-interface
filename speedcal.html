<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milling Speeds & Feeds Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', 'Inter', sans-serif; scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    
    .btn-next, .btn-prev { padding: 0.6rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.2s; }
    .btn-next { background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%); color: #fff; box-shadow: 0 4px 14px rgb(0 0 0 / 10%); }
    .btn-next:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
    .btn-prev { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    
    .selection-card { border: 2px solid #e2e8f0; transition: all 0.2s; }
    .selection-card:hover { transform: translateY(-2px); border-color: #60a5fa; }
    .selection-card.selected { border-color: #3b82f6; box-shadow: 0 0 0 3px rgb(59 130 246 / 25%); background-color: #eff6ff; }
    
    .step-guide { border-left: 4px solid #e2e8f0; transition: all 0.3s; }
    .step-guide.highlight { border-left-color: #3b82f6; background-color: #eff6ff; transform: scale(1.02); }

    /* Slider CSS */
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); border: 2px solid #fff; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-start py-8 px-4">
  
  <div class="w-full max-w-xl mb-4 text-center">
      <img src="Powered bymcos.png" alt="Maker Customs Logo" class="mx-auto h-20 object-contain">  
  </div>

  <div class="w-full max-w-xl bg-white/90 backdrop-blur-sm shadow-2xl rounded-2xl p-6 md:p-8">
    <header class="mb-6 flex flex-col items-center text-center">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-800">เครื่องคำนวณ Speeds & Feeds</h1>
      <p class="text-sm text-slate-500 mt-1">Milling Wizard by Maker Customs</p>
      <div id="step-indicator" class="text-sm font-semibold text-blue-600 mt-4"></div>
    </header>

    <main id="app" class="transition-all duration-300"></main>
  </div>

  <footer class="mt-8 text-center text-xs text-slate-500">
    <p>© 2025 Milling Wizard Maker Customs</p>
  </footer>

  <script>
    // --- DATA & CONFIG ---
    let state = {
      step: 0,
      materialKey: null,
      tool: { mat: 'carbide', flutes: 2, coating: 'nocoat', diameter: 6 },
      performanceAdj: 0 // 0 = 0%, 1 = 100%, 2 = 200%
    };

    // คงรูปภาพ SVG เดิมของคุณไว้
    const MATERIALS = [
      { key: 'nonferrous', name: 'โลหะอ่อน', desc: 'อะลูมิเนียม, ทองแดง', speed: 250, chipLoadFactor: 120, icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 12h10"/></svg>` },
      { key: 'steel', name: 'เหล็ก', desc: 'เหล็กคาร์บอน, สแตนเลส', speed: 70, chipLoadFactor: 180, icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M12 12h.01"/></svg>` },
      { key: 'plastic', name: 'พลาสติก/ไม้', desc: 'POM, PEEK, อะคริลิค', speed: 300, chipLoadFactor: 80, icon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.5 2.5-19 19"/><path d="M6.3 20.2c-1 .4-2.2.2-3.2-.8s-1.1-2.2-.8-3.2"/><path d="M12.3 14.2c-1 .4-2.2.2-3.2-.8s-1.1-2.2-.8-3.2"/><path d="m5.5 2.5 16 16"/><path d="M20.2 17.7c.4 1 .2 2.2-.8 3.2s-2.2 1.1-3.2.8"/><path d="M14.2 11.7c.4 1 .2 2.2-.8 3.2s-2.2 1.1-3.2.8"/></svg>` }
    ];

    // คงรูปภาพ PNG เดิมของคุณไว้
    const FLUTES = [
        { n: 1, image: 'tool1f.png' },
        { n: 2, image: 'tool2f.png' },
        { n: 3, image: 'tool3f.png' },
        { n: 4, image: 'tool4f.png' }
    ];

    const COATINGS = [
        { key: 'dlc', name: 'DLC', tip: 'แนะนำสำหรับอะลูมิเนียม', image: 'DLCtool.png' },
        { key: 'altin', name: 'AlTiN', tip: 'สำหรับงานเหล็ก', image: 'altin.png' },
        { key: 'nocoat', name: 'No Coat', tip: 'สำหรับงานทั่วไป', image: 'nocoat.png' }
    ];

    const DIAMS = [1, 2, 3, 4, 6, 8, 10, 12, 16, 20];
    const TOOL_MAT = [ { key: 'carbide', name: 'Carbide' }, { key: 'hss', name: 'HSS' } ];

    // --- CALCULATION LOGIC ---
    function calculateValues() {
        const material = MATERIALS.find(x => x.key === state.materialKey);
        if (!material) return { rpm: 0, feed: 0 };

        let cuttingSpeed = material.speed;
        let chipLoad = state.tool.diameter / material.chipLoadFactor;

        // Adjustments
        if (state.tool.mat === 'hss') cuttingSpeed *= 0.5;
        if (state.tool.coating === 'dlc' && material.key === 'nonferrous') cuttingSpeed *= 1.2;
        if (state.tool.coating === 'altin' && material.key === 'steel') cuttingSpeed *= 1.2;

        const baseRPM = (cuttingSpeed * 1000) / (Math.PI * state.tool.diameter);
        const baseFeed = baseRPM * state.tool.flutes * chipLoad;

        // Apply Slider Adjustment
        const finalRPM = baseRPM * (1 + state.performanceAdj);
        const finalFeed = baseFeed * (1 + state.performanceAdj);

        // Step Down Logic
        let stepDownMin = 0, stepDownMax = 0;
        if (material.key === 'plastic') { stepDownMin = 0.5 * state.tool.diameter; stepDownMax = 1.0 * state.tool.diameter; }
        else if (material.key === 'nonferrous') { stepDownMin = 0.2 * state.tool.diameter; stepDownMax = 0.5 * state.tool.diameter; }
        else { stepDownMin = 0.05 * state.tool.diameter; stepDownMax = 0.25 * state.tool.diameter; }

        return {
            rpm: Math.round(finalRPM),
            feed: Math.round(finalFeed),
            baseRPM: Math.round(baseRPM),
            baseFeed: Math.round(baseFeed),
            minStep: stepDownMin.toFixed(2),
            maxStep: stepDownMax.toFixed(2)
        };
    }

    // --- RENDER FUNCTIONS ---
    function render() {
      const appEl = document.getElementById('app');
      document.getElementById('step-indicator').textContent = `ขั้นตอนที่ ${state.step + 1}/3: ${["เลือกวัสดุ", "เลือกเครื่องมือ", "ดูผลลัพธ์"][state.step]}`;

      if (state.step === 0) appEl.innerHTML = renderMaterialScreen();
      else if (state.step === 1) appEl.innerHTML = renderToolScreen();
      else if (state.step === 2) {
          // Render โครงสร้างแค่ครั้งเดียว ถ้ามีอยู่แล้วให้ update ค่าอย่างเดียว
          if (!document.getElementById('result-screen')) {
             appEl.innerHTML = renderResultScreen();
          }
          updateResultValues(); // <-- นี่คือจุดสำคัญที่ทำให้ Slider ไม่กระตุก
      }
    }

    function renderMaterialScreen() {
      return `<div class="space-y-4 animate-fade-in">
          ${MATERIALS.map(m => `
            <button onclick="setMaterial('${m.key}')" class="selection-card w-full rounded-xl p-4 flex items-center gap-4 text-left ${state.materialKey === m.key ? 'selected' : ''}">
              <div class="w-12 h-12 flex-shrink-0 bg-slate-100 rounded-lg flex items-center justify-center text-slate-500">${m.icon}</div>
              <div>
                <div class="font-bold text-slate-800 text-lg">${m.name}</div>
                <div class="text-sm text-slate-500">${m.desc}</div>
              </div>
            </button>
          `).join('')}
          <div class="flex justify-end mt-8"><button onclick="nextStep()" class="btn-next" ${state.materialKey ? '' : 'disabled'}>ถัดไป &rarr;</button></div>
      </div>`;
    }

    function renderToolScreen() {
      return `<div class="space-y-6 animate-fade-in">
          <div><label class="font-semibold text-slate-700 mb-2 block">วัสดุของดอกกัด</label>
            <div class="flex gap-3">${TOOL_MAT.map(t => `<button onclick="setTool('mat', '${t.key}')" class="px-4 py-2 rounded-lg border-2 ${state.tool.mat === t.key ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 bg-white'}">${t.name}</button>`).join('')}</div>
          </div>
          
          <div><label class="font-semibold text-slate-700 mb-2 block">จำนวนฟัน (Flutes)</label>
            <div class="grid grid-cols-4 gap-3">
              ${FLUTES.map(f => `
                <button onclick="setTool('flutes', ${f.n})" class="selection-card p-3 rounded-lg flex flex-col items-center justify-center gap-1 ${state.tool.flutes === f.n ? 'selected' : ''}">
                    <img src="${f.image}" alt="${f.n} Flutes" class="h-16 w-auto object-contain mb-1">
                    <span class="font-bold text-lg">${f.n} ฟัน</span>
                </button>`).join('')}
            </div>
          </div>

          <div><label class="font-semibold text-slate-700 mb-2 block">ผิวเคลือบ (Coating)</label>
            <div class="space-y-2">
              ${COATINGS.map(c => `
                 <button onclick="setTool('coating', '${c.key}')" class="selection-card w-full text-left p-3 rounded-lg flex items-center gap-3 ${state.tool.coating === c.key ? 'selected' : ''}">
                    <img src="${c.image}" alt="${c.name}" class="h-10 w-10 rounded object-cover border border-slate-200">
                    <div class="flex-grow">
                        <span class="font-semibold">${c.name}</span>
                        ${c.tip ? `<span class="block text-xs text-slate-500">${c.tip}</span>` : ''}
                    </div>
                </button>`).join('')}
            </div>
          </div>

          <div><label class="font-semibold text-slate-700 mb-2 block">ขนาดดอก (mm)</label>
            <div class="flex gap-2 flex-wrap">${DIAMS.map(d => `<button onclick="setTool('diameter', ${d})" class="w-10 h-10 rounded-full border-2 font-medium ${state.tool.diameter === d ? 'border-blue-500 bg-blue-600 text-white' : 'border-slate-200 bg-white hover:bg-slate-50'}">${d}</button>`).join('')}</div>
          </div>

          <div class="flex justify-between mt-8"><button onclick="prevStep()" class="btn-prev">&larr; ย้อนกลับ</button><button onclick="nextStep()" class="btn-next">คำนวณ &rarr;</button></div>
      </div>`;
    }

    function renderResultScreen() {
        // สร้าง HTML โครงร่าง (Skeleton) รอรับค่า
        return `<div id="result-screen" class="space-y-5 animate-fade-in">
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                    <div class="text-sm text-slate-500">Spindle Speed</div>
                    <div class="text-3xl font-bold text-blue-600 my-1"><span id="val-rpm">0</span></div>
                    <div class="text-xs text-slate-400">RPM</div>
                </div>
                <div class="bg-slate-100 p-4 rounded-xl border border-slate-200">
                    <div class="text-sm text-slate-500">Feed Rate</div>
                    <div class="text-3xl font-bold text-blue-600 my-1"><span id="val-feed">0</span></div>
                    <div class="text-xs text-slate-400">mm/min</div>
                </div>
            </div>

            <div class="p-5 bg-white border-2 border-slate-200 rounded-xl shadow-sm">
                <label class="font-semibold text-slate-700 flex justify-between mb-4">
                    <span>ปรับความเร็ว (Aggressiveness)</span>
                    <span id="val-adj-display" class="font-bold text-blue-600">0%</span>
                </label>
                <input type="range" min="-0.5" max="2.0" step="0.1" value="${state.performanceAdj}" 
                    oninput="handleSlider(this.value)" class="w-full mb-2">
                <div class="flex justify-between text-xs text-slate-400 font-medium">
                    <span>Safe (-50%)</span>
                    <span>Standard (0%)</span>
                    <span class="text-red-500">Fast (+200%)</span>
                </div>
            </div>

            <div class="p-4 bg-blue-50 border border-blue-200 rounded-xl text-center">
                <h3 class="font-semibold text-slate-800 text-sm">แนะนำความลึกต่อชั้น (Step Down)</h3>
                <p class="text-xl font-bold text-blue-700 mt-1">
                    <span id="val-step-min">0</span> – <span id="val-step-max">0</span> mm
                </p>
            </div>

            <div class="flex justify-between mt-8">
                <button onclick="prevStep()" class="btn-prev">&larr; แก้ไข</button>
                <button onclick="resetApp()" class="btn-next bg-slate-800">เริ่มใหม่ ↺</button>
            </div>
        </div>`;
    }

    // --- ACTIONS ---
    function updateResultValues() {
        const res = calculateValues();
        
        // อัปเดตตัวเลขลงไปใน HTML element เดิม (ไม่สร้างใหม่)
        document.getElementById('val-rpm').innerText = res.rpm.toLocaleString();
        document.getElementById('val-feed').innerText = res.feed.toLocaleString();
        document.getElementById('val-step-min').innerText = res.minStep;
        document.getElementById('val-step-max').innerText = res.maxStep;

        const percent = Math.round(state.performanceAdj * 100);
        const adjDisplay = document.getElementById('val-adj-display');
        adjDisplay.innerText = (percent > 0 ? '+' : '') + percent + '%';
        
        // เปลี่ยนสีตัวเลขตามความซิ่ง
        if(percent > 100) adjDisplay.className = "font-bold text-red-600";
        else if(percent < 0) adjDisplay.className = "font-bold text-green-600";
        else adjDisplay.className = "font-bold text-blue-600";
    }

    // แยก Event Slider ออกมา เพื่อเรียก updateResultValues() เท่านั้น
    window.handleSlider = (val) => {
        state.performanceAdj = parseFloat(val);
        updateResultValues();
    };

    window.setMaterial = (k) => { state.materialKey = k; render(); };
    window.setTool = (p, v) => { state.tool[p] = v; render(); };
    window.nextStep = () => { state.step++; render(); };
    
    window.prevStep = () => { 
        // ถ้าอยู่หน้า Result ให้ลบ HTML ทิ้งก่อนถอยกลับ เพื่อให้สร้างใหม่ได้ถูกเมื่อเข้ามาใหม่
        if(state.step===2) {
             const resultEl = document.getElementById('result-screen');
             if(resultEl) resultEl.remove();
        }
        state.step--; 
        render(); 
    };
    
    window.resetApp = () => { state.step = 0; state.materialKey = null; state.performanceAdj = 0; render(); };

    // Start
    render();
  </script>
</body>
</html>
